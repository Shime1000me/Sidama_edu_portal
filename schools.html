<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Schools - Sidama Education Portal</title>
    <meta name="description" content="Schools in your selected woreda. Register online.">
    <link rel="icon" href="images/logo.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f8f9fa;
            color: #1a1a1a;
            line-height: 1.5;
        }
        .top-bar {
            background: #0b4f37;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 5px 10px;
        }
        .lang-switcher {
            display: flex;
            gap: 8px;
        }
        .lang-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        .lang-btn.active {
            background: #fcd116;
            color: #0b4f37;
            font-weight: bold;
        }
        .mobile-menu {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 200;
            transition: left 0.3s ease;
            padding: 20px;
        }
        .mobile-menu.open { left: 0; }
        .close-menu {
            background: none;
            border: none;
            font-size: 24px;
            float: right;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .mobile-menu a {
            display: block;
            padding: 12px 0;
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #eee;
        }
        .menu-divider {
            height: 1px;
            background: #ddd;
            margin: 15px 0;
        }
        .menu-langs button {
            background: #f0f0f0;
            border: none;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            text-align: left;
            margin: 5px 0;
            cursor: pointer;
        }
        main {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }
        .back-btn {
            background: none;
            border: none;
            color: #0b4f37;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .page-title {
            font-size: 20px;
            color: #0b4f37;
            margin-bottom: 8px;
        }
        .location-info {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .schools-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .school-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .school-card h4 {
            font-size: 16px;
            margin-bottom: 4px;
            color: #0b4f37;
        }
        .school-location {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }
        .school-grades {
            font-size: 12px;
            color: #0b4f37;
            margin-bottom: 4px;
        }
        .school-rating {
            font-size: 12px;
            color: #fcd116;
            margin-bottom: 12px;
        }
        .register-btn {
            background: #fcd116;
            border: none;
            padding: 10px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
        }
        .page-btn {
            background: white;
            border: 1px solid #ddd;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
        }
        .page-btn.active {
            background: #0b4f37;
            color: white;
            border: none;
        }
        footer {
            background: #0b4f37;
            color: white;
            padding: 30px 20px;
            text-align: center;
            margin-top: 40px;
        }
        .footer-logo-img { width: 60px; height: auto; margin-bottom: 10px; }
        .footer-logo h3 { font-size: 14px; margin-top: 8px; }
        .footer-contact p { font-size: 12px; margin: 5px 0; }
        .footer-contact a { color: white; text-decoration: none; }
        .footer-copyright { font-size: 10px; margin-top: 20px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="menu-btn" id="menuBtn">☰</button>
    <div class="lang-switcher">
        <button class="lang-btn active" data-lang="en">ENGLISH</button>
        <button class="lang-btn" data-lang="sid">SIDAAMU AFOO</button>
        <button class="lang-btn" data-lang="amh">አማርኛ</button>
    </div>
</div>

<div class="mobile-menu" id="mobileMenu">
    <button class="close-menu" id="closeMenu">✕</button>
    <a href="index.html" data-key="home">HOME</a>
    <a href="search.html" data-key="search">SEARCH</a>
    <a href="zones.html" data-key="zones">ZONES</a>
    <a href="about.html" data-key="about">ABOUT US</a>
    <a href="contact.html" data-key="contact">CONTACT</a>
    <a href="help.html" data-key="help">HELP</a>
    <div class="menu-divider"></div>
    <div class="menu-langs">
        <button data-lang="en">🌐 ENGLISH</button>
        <button data-lang="sid">🌐 SIDAAMU AFOO</button>
        <button data-lang="amh">🌐 አማርኛ</button>
    </div>
</div>

<main>
    <button class="back-btn" id="backBtn" data-key="back">← BACK</button>
    <h1 class="page-title" id="pageTitle">Schools</h1>
    <div class="location-info" id="locationInfo"></div>
    <div class="schools-grid" id="schoolsGrid"></div>
    <div class="pagination" id="pagination"></div>
</main>

<footer>
    <div class="footer-logo"><img src="images/logo.png" alt="Logo" class="footer-logo-img"><h3 data-key="footer_bureau">SIDAMA EDUCATION BUREAU</h3></div>
    <div class="footer-contact"><p>📍 Hawassa, Sidama Region</p><p>📞 +251962524802</p><p><a href="https://t.me/shimetechsolutions" target="_blank">✉️ info@sidamaeducation.gov.et</a></p></div>
    <div class="footer-copyright"><p>© 2026 Sidama Education Bureau. All Rights Reserved.</p></div>
</footer>

<script>
    // Sample schools data - in real implementation, this would come from schools.json
    const allSchools = [
        { name_en: "Abela School", name_sid: "ABDELA ROSI MINE", name_amh: "አቤላ ትምህርት ቤት", grades: "Grades 1-8", rating: "⭐ 4.5", form_link: "#" },
        { name_en: "Bellata School", name_sid: "BELLATA ROSI MINE", name_amh: "በላታ ትምህርት ቤት", grades: "Grades 1-8", rating: "⭐ 4.6", form_link: "#" },
        { name_en: "Bulchana School", name_sid: "BULCHANA ROSI MINE", name_amh: "ቡልቻና ትምህርት ቤት", grades: "Grades 1-8", rating: "⭐ 4.4", form_link: "#" },
        { name_en: "Chire School", name_sid: "CHIRE ROSI MINE", name_amh: "ጭሬ ትምህርት ቤት", grades: "Grades 1-8", rating: "⭐ 4.5", form_link: "#" },
        { name_en: "Dale Catholic School", name_sid: "DAALE KATOLIKKI ROSI MINE", name_amh: "ዳሌ ካቶሊክ ትምህርት ቤት", grades: "Grades 1-8", rating: "⭐ 4.7", form_link: "#" },
        { name_en: "Dale Elementary School", name_sid: "DAALE KOYTO ROSI MINE", name_amh: "ዳሌ አንደኛ ደረጃ ትምህርት ቤት", grades: "Grades 1-8", rating: "⭐ 4.8", form_link: "#" },
        { name_en: "Dale Preparatory School", name_sid: "DAALE PREPARATORY ROSI MINE", name_amh: "ዳሌ መሰናዶ ትምህርት ቤት", grades: "Grades 11-12", rating: "⭐ 4.6", form_link: "#" },
        { name_en: "Dale Secondary School", name_sid: "DAALE LAMMAFFAA ROSI MINE", name_amh: "ዳሌ ሁለተኛ ደረጃ ትምህርት ቤት", grades: "Grades 9-12", rating: "⭐ 4.5", form_link: "#" },
        { name_en: "Furgusa School", name_sid: "FURGUSA ROSI MINE", name_amh: "ፉርጉሳ ትምህርት ቤት", grades: "Grades 1-8", rating: "⭐ 4.3", form_link: "#" },
        { name_en: "Garba School", name_sid: "GARBA ROSI MINE", name_amh: "ጋርባ ትምህርት ቤት", grades: "Grades 1-8", rating: "⭐ 4.4", form_link: "#" },
        { name_en: "Gelgelu School", name_sid: "GELGELU ROSI MINE", name_amh: "ገልገሉ ትምህርት ቤት", grades: "Grades 1-8", rating: "⭐ 4.5", form_link: "#" },
        { name_en: "Gudumale School", name_sid: "GUDUMALE ROSI MINE", name_amh: "ጉዱማሌ ትምህርት ቤት", grades: "Grades 1-8", rating: "⭐ 4.2", form_link: "#" },
        { name_en: "Hagere Selam School", name_sid: "HAGERE SELAM ROSI MINE", name_amh: "ሐገረ ሰላም ትምህርት ቤት", grades: "Grades 1-8", rating: "⭐ 4.6", form_link: "#" },
        { name_en: "Halala School", name_sid: "HALALA ROSI MINE", name_amh: "ሀላላ ትምህርት ቤት", grades: "Grades 1-8", rating: "⭐ 4.3", form_link: "#" },
        { name_en: "Hambela School", name_sid: "HAMBELA ROSI MINE", name_amh: "ሀምበላ ትምህርት ቤት", grades: "Grades 1-8", rating: "⭐ 4.4", form_link: "#" },
        { name_en: "Hidotu School", name_sid: "HIDOTU ROSI MINE", name_amh: "ሂዶቱ ትምህርት ቤት", grades: "Grades 1-8", rating: "⭐ 4.2", form_link: "#" },
        { name_en: "Keresa School", name_sid: "KERESA ROSI MINE", name_amh: "ከረሳ ትምህርት ቤት", grades: "Grades 1-8", rating: "⭐ 4.5", form_link: "#" },
        { name_en: "Ras Desta Secondary", name_sid: "RAAS DESTA LAMMAFFAA ROSI MINE", name_amh: "ራስ ደስታ ሁለተኛ ደረጃ ትምህርት ቤት", grades: "Grades 9-12", rating: "⭐ 4.8", form_link: "#" },
        { name_en: "Tsinat Secondary", name_sid: "TSINAAT LAMMAFFAA ROSI MINE", name_amh: "ጽናት ሁለተኛ ደረጃ ትምህርት ቤት", grades: "Grades 9-12", rating: "⭐ 4.9", form_link: "#" },
        { name_en: "Wolita School", name_sid: "WOLITA ROSI MINE", name_amh: "ወሊታ ትምህርት ቤት", grades: "Grades 1-8", rating: "⭐ 4.3", form_link: "#" },
        { name_en: "Wora School", name_sid: "WORA ROSI MINE", name_amh: "ዎራ ትምህርት ቤት", grades: "Grades 1-8", rating: "⭐ 4.4", form_link: "#" }
    ];

    let currentLang = 'en';
    let currentZone = '';
    let currentWoreda = '';
    let currentPage = 1;
    const schoolsPerPage = 10;

    const translations = {
        en: {
            back: "← BACK", back_to_woreda: "← BACK TO WOREDA",
            home: "HOME", search: "SEARCH", zones: "ZONES", about: "ABOUT US", contact: "CONTACT", help: "HELP",
            footer_bureau: "SIDAMA EDUCATION BUREAU", register: "REGISTER"
        },
        sid: {
            back: "← HIGI", back_to_woreda: "← WOREDA HIGI",
            home: "🏠 KAIMA", search: "🔍 HASI", zones: "📍 ZOONNA", about: "ℹ️ NINKE DAAFIRA", contact: "📞 NINKENNI XAADI", help: "❓ KAA'LO",
            footer_bureau: "SIDAAMU QOQQOWI ROSU BIIRO", register: "🚀 BORREESSAMI"
        },
        amh: {
            back: "← ተመለስ", back_to_woreda: "← ወደ ወረዳ ተመለስ",
            home: "🏠 መነሻ", search: "🔍 ፍለጋ", zones: "📍 ዞኖች", about: "ℹ️ ስለ እኛ", contact: "📞 አድራሻ", help: "❓ እገዛ",
            footer_bureau: "ሲዳማ ትምህርት ቢሮ", register: "🚀 ይመዝገቡ"
        }
    };

    function getSchoolName(school) {
        if (currentLang === 'en') return school.name_en;
        if (currentLang === 'sid') return school.name_sid;
        return school.name_amh;
    }

    function loadSchools() {
        const container = document.getElementById('schoolsGrid');
        if (!container) return;
        
        const start = (currentPage - 1) * schoolsPerPage;
        const end = start + schoolsPerPage;
        const pageSchools = allSchools.slice(start, end);
        
        container.innerHTML = '';
        pageSchools.forEach(school => {
            const card = document.createElement('div');
            card.className = 'school-card';
            card.innerHTML = `
                <h4>${getSchoolName(school)}</h4>
                <div class="school-grades">🎓 ${school.grades}</div>
                <div class="school-rating">${school.rating}</div>
                <button class="register-btn" onclick="window.open('${school.form_link}', '_blank')">${translations[currentLang].register}</button>
            `;
            container.appendChild(card);
        });
        
        loadPagination();
    }

    function loadPagination() {
        const container = document.getElementById('pagination');
        if (!container) return;
        
        const totalPages = Math.ceil(allSchools.length / schoolsPerPage);
        if (totalPages <= 1) {
            container.innerHTML = '';
            return;
        }
        
        let html = '';
        for (let i = 1; i <= totalPages; i++) {
            html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
        }
        container.innerHTML = html;
    }

    function goToPage(page) {
        currentPage = page;
        loadSchools();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function applyTranslations() {
        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            if (translations[currentLang][key]) el.innerHTML = translations[currentLang][key];
        });
        document.querySelectorAll('.mobile-menu a').forEach(link => {
            const key = link.getAttribute('data-key');
            if (key && translations[currentLang][key]) link.innerHTML = translations[currentLang][key];
        });
        
        document.getElementById('pageTitle').innerHTML = currentWoreda ? `${currentWoreda} - Schools` : 'Schools';
        document.getElementById('locationInfo').innerHTML = currentZone ? `📍 ${currentZone} › ${currentWoreda}` : '';
        
        loadSchools();
    }

    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('preferredLang', lang);
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.getAttribute('data-lang') === lang) btn.classList.add('active');
        });
        applyTranslations();
    }

    // Get parameters from URL
    const urlParams = new URLSearchParams(window.location.search);
    currentZone = urlParams.get('zone') || '';
    currentWoreda = urlParams.get('woreda') || '';

    document.getElementById('backBtn')?.addEventListener('click', () => {
        if (currentZone && currentWoreda) {
            window.location.href = `woreda.html?zone=${encodeURIComponent(currentZone)}`;
        } else {
            window.location.href = 'zones.html';
        }
    });

    const menuBtn = document.getElementById('menuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const closeMenu = document.getElementById('closeMenu');
    menuBtn?.addEventListener('click', () => mobileMenu.classList.add('open'));
    closeMenu?.addEventListener('click', () => mobileMenu.classList.remove('open'));

    document.querySelectorAll('.lang-btn, .menu-langs button').forEach(btn => {
        btn.addEventListener('click', () => {
            setLanguage(btn.getAttribute('data-lang'));
            mobileMenu.classList.remove('open');
        });
    });

    const savedLang = localStorage.getItem('preferredLang');
    setLanguage(savedLang && ['en','sid','amh'].includes(savedLang) ? savedLang : 'en');
</script>

</body>
</html>
