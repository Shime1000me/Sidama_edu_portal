<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Woreda - Sidama Education Portal</title>
    <meta name="description" content="Select your woreda to find schools in Sidama Region.">
    <link rel="icon" href="images/logo.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f8f9fa;
            color: #1a1a1a;
            line-height: 1.5;
        }
        .top-bar {
            background: #0b4f37;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 5px 10px;
        }
        .lang-switcher {
            display: flex;
            gap: 8px;
        }
        .lang-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        .lang-btn.active {
            background: #fcd116;
            color: #0b4f37;
            font-weight: bold;
        }
        .mobile-menu {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 200;
            transition: left 0.3s ease;
            padding: 20px;
        }
        .mobile-menu.open { left: 0; }
        .close-menu {
            background: none;
            border: none;
            font-size: 24px;
            float: right;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .mobile-menu a {
            display: block;
            padding: 12px 0;
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #eee;
        }
        .menu-divider {
            height: 1px;
            background: #ddd;
            margin: 15px 0;
        }
        .menu-langs button {
            background: #f0f0f0;
            border: none;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            text-align: left;
            margin: 5px 0;
            cursor: pointer;
        }
        main {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }
        .back-btn {
            background: none;
            border: none;
            color: #0b4f37;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .page-title {
            font-size: 20px;
            color: #0b4f37;
            margin-bottom: 8px;
        }
        .zone-info {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .woredas-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .woreda-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .woreda-name {
            font-size: 16px;
            font-weight: 500;
        }
        .woreda-btn {
            background: #0b4f37;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 12px;
        }
        .message-box {
            background: #fff3cd;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
        }
        .message-box p {
            color: #856404;
            margin-bottom: 15px;
        }
        .message-box button {
            background: #0b4f37;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
        }
        footer {
            background: #0b4f37;
            color: white;
            padding: 30px 20px;
            text-align: center;
            margin-top: 40px;
        }
        .footer-logo-img { width: 60px; height: auto; margin-bottom: 10px; }
        .footer-logo h3 { font-size: 14px; margin-top: 8px; }
        .footer-contact p { font-size: 12px; margin: 5px 0; }
        .footer-contact a { color: white; text-decoration: none; }
        .footer-copyright { font-size: 10px; margin-top: 20px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="menu-btn" id="menuBtn">☰</button>
    <div class="lang-switcher">
        <button class="lang-btn active" data-lang="en">ENGLISH</button>
        <button class="lang-btn" data-lang="sid">SIDAAMU AFOO</button>
        <button class="lang-btn" data-lang="amh">አማርኛ</button>
    </div>
</div>

<div class="mobile-menu" id="mobileMenu">
    <button class="close-menu" id="closeMenu">✕</button>
    <a href="index.html" data-key="home">HOME</a>
    <a href="search.html" data-key="search">SEARCH</a>
    <a href="zones.html" data-key="zones">ZONES</a>
    <a href="about.html" data-key="about">ABOUT US</a>
    <a href="contact.html" data-key="contact">CONTACT</a>
    <a href="help.html" data-key="help">HELP</a>
    <div class="menu-divider"></div>
    <div class="menu-langs">
        <button data-lang="en">🌐 ENGLISH</button>
        <button data-lang="sid">🌐 SIDAAMU AFOO</button>
        <button data-lang="amh">🌐 አማርኛ</button>
    </div>
</div>

<main>
    <button class="back-btn" id="backBtn" data-key="back">← BACK</button>
    <h1 class="page-title" id="zoneTitle">Loading...</h1>
    <div class="zone-info" id="zoneInfo"></div>
    <div class="woredas-grid" id="woredasGrid"></div>
    <div class="message-box" id="messageBox" style="display: none;">
        <p id="messageText">Schools will be added soon</p>
        <button id="backToZonesBtn" data-key="back_to_zones">← BACK TO ZONES</button>
    </div>
</main>

<footer>
    <div class="footer-logo"><img src="images/logo.png" alt="Logo" class="footer-logo-img"><h3 data-key="footer_bureau">SIDAMA EDUCATION BUREAU</h3></div>
    <div class="footer-contact"><p>📍 Hawassa, Sidama Region</p><p>📞 +251962524802</p><p><a href="https://t.me/shimetechsolutions" target="_blank">✉️ info@sidamaeducation.gov.et</a></p></div>
    <div class="footer-copyright"><p>© 2026 Sidama Education Bureau. All Rights Reserved.</p></div>
</footer>

<script>
    // Woredas data with 3 languages
    const woredasData = {
        "CENTRAL SIDAMA ZONE": {
            en: ["Arbegona", "Dale", "Darara", "Irgalem Town", "Loko Abaya", "Shafamo", "Wensho"],
            sid: ["Arbegooona", "Daalle", "Daraara", "Yirgaalame", "Lokka Abbaayya", "Shaafaamo", "Wonsho"],
            amh: ["አርበጎና", "ዳሌ", "ደራራ", "ኢርጋለም ከተማ", "ሎኮ አባያ", "ሻፋሞ", "ወንሾ"]
        },
        "EASTERN SIDAMA ZONE": {
            en: ["Aroresa", "Bensa", "Bona Zuria", "Bura", "Chabe Gambeltu", "Chere", "Daela", "Daye Town", "Hoko"],
            sid: ["Arooreessa", "Bansa", "Booni Ganagaawa", "Burra", "Caabbe Gaambeltu", "Cirre", "Deela", "Daayye Katama", "Hoko"],
            amh: ["አሮረሳ", "ቤንሳ", "ቦና ዙሪያ", "ቡራ", "ቻቤ ጋምቤልቱ", "ጨረ", "ዳኤላ", "ዳዬ ከተማ", "ሆኮ"]
        },
        "HAWASSA ZONE": {
            en: ["Addis Ketema", "Hayk Dar", "Mehal", "Menahariya", "Misrak", "Tabor", "Hawela Tula", "Bahil Adarash"],
            sid: ["Addisi Ketema", "Hayqi Daari", "Mehaali", "Mennahaariha", "Misiraaqi", "Taaboori", "Haweela Tuula", "Bahili Addaraashshi"],
            amh: ["አዲስ ከተማ", "ሐይቅ ዳር", "መሀል", "መናህሪያ", "ምሥራቅ", "ታቦር", "ሀወላ ቱላ", "ባሕል አደራሽ"]
        },
        "NORTHERN SIDAMA ZONE": {
            en: ["Bilate Zuria", "Boricha", "Gorche", "Hawassa Zuria", "Malga", "Shebedino", "Wondo Genet"],
            sid: ["Bilaatte Gangaawa", "Borricha", "Gorchee", "Hawaasi Gaangaawa", "Malga", "Shabbadiino", "Wondo Gannate"],
            amh: ["ብላቴ ዙሪያ", "ቦሪቻ", "ጎርቼ", "ሀዋሳ ዙሪያ", "ማልጋ", "ሸበዲኖ", "ወንዶ ገነት"]
        },
        "SOUTHERN SIDAMA ZONE": {
            en: ["Aleta Wendo", "Aleta Wendo Town", "Bursa", "Chuko", "Dara", "Dara Otilcho", "Hula", "Teticha"],
            sid: ["Aletta Wondo", "Aletta Wondo Kifile-katama", "Bursa", "Cuukko", "Daarra", "Daarra Otilch", "Hula", "Xexicha"],
            amh: ["አለታ ወንዶ", "አለታ ወንዶ ከተማ", "ቡርሳ", "ቹኮ", "ዳራ", "ዳራ ኦቲልቾ", "ሁላ", "ጠጢቻ"]
        }
    };

    // Zone name translations for display
    const zoneNames = {
        "CENTRAL SIDAMA ZONE": { en: "CENTRAL SIDAMA ZONE", sid: "MEREERI SIDAAMI ZOONE", amh: "ማዕከላዊ ሲዳማ ዞን" },
        "EASTERN SIDAMA ZONE": { en: "EASTERN SIDAMA ZONE", sid: "SOOJJAATI SIDAAMI ZOONE", amh: "ምሥራቅ ሲዳማ ዞን" },
        "HAWASSA ZONE": { en: "HAWASSA ZONE", sid: "HAWAASI ZOONE", amh: "ሀዋሳ ዞን" },
        "NORTHERN SIDAMA ZONE": { en: "NORTHERN SIDAMA ZONE", sid: "ALIYYE SIDAAMI ZOONE", amh: "ሰሜን ሲዳማ ዞን" },
        "SOUTHERN SIDAMA ZONE": { en: "SOUTHERN SIDAMA ZONE", sid: "WODIIDI SIDAAMI ZOONE", amh: "ደቡብ ሲዳማ ዞን" }
    };

    let currentLang = 'en';
    let currentZone = null;
    let zoneWoredas = [];

    const translations = {
        en: {
            back: "← BACK", back_to_zones: "← BACK TO ZONES", message: "Schools will be added soon",
            home: "HOME", search: "SEARCH", zones: "ZONES", about: "ABOUT US", contact: "CONTACT", help: "HELP",
            footer_bureau: "SIDAMA EDUCATION BUREAU", select: "SELECT"
        },
        sid: {
            back: "← HIGI", back_to_zones: "← ZOONNA HIGI", message: "ROSU MINNA MULI BARRI GIDDO LENDEEMO",
            home: "🏠 KAIMA", search: "🔍 HASI", zones: "📍 ZOONNA", about: "ℹ️ NINKE DAAFIRA", contact: "📞 NINKENNI XAADI", help: "❓ KAA'LO",
            footer_bureau: "SIDAAMU QOQQOWI ROSU BIIRO", select: "DOORI"
        },
        amh: {
            back: "← ተመለስ", back_to_zones: "← ወደ ዞኖች ተመለስ", message: "ትምህርት ቤቶች በቅርቡ ይጨመራሉ",
            home: "🏠 መነሻ", search: "🔍 ፍለጋ", zones: "📍 ዞኖች", about: "ℹ️ ስለ እኛ", contact: "📞 አድራሻ", help: "❓ እገዛ",
            footer_bureau: "ሲዳማ ትምህርት ቢሮ", select: "ይምረጡ"
        }
    };

    function loadWoredas() {
        const container = document.getElementById('woredasGrid');
        const messageBox = document.getElementById('messageBox');
        
        if (!zoneWoredas || zoneWoredas.length === 0) {
            container.innerHTML = '';
            messageBox.style.display = 'block';
            document.getElementById('messageText').innerHTML = translations[currentLang].message;
            return;
        }
        
        messageBox.style.display = 'none';
        container.innerHTML = '';
        
        zoneWoredas.forEach(woreda => {
            const card = document.createElement('div');
            card.className = 'woreda-card';
            card.innerHTML = `<span class="woreda-name">${woreda}</span><button class="woreda-btn" onclick="window.location.href='schools.html?zone=${encodeURIComponent(currentZone)}&woreda=${encodeURIComponent(woreda)}'">${translations[currentLang].select}</button>`;
            container.appendChild(card);
        });
    }

    function applyTranslations() {
        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            if (translations[currentLang][key]) el.innerHTML = translations[currentLang][key];
        });
        document.querySelectorAll('.mobile-menu a').forEach(link => {
            const key = link.getAttribute('data-key');
            if (key && translations[currentLang][key]) link.innerHTML = translations[currentLang][key];
        });
        
        if (currentZone) {
            const displayZoneName = zoneNames[currentZone] ? zoneNames[currentZone][currentLang] : currentZone;
            document.getElementById('zoneTitle').innerHTML = displayZoneName;
            document.getElementById('zoneInfo').innerHTML = `📍 ${zoneWoredas.length} Woredas`;
        }
        loadWoredas();
    }

    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('preferredLang', lang);
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.getAttribute('data-lang') === lang) btn.classList.add('active');
        });
        applyTranslations();
    }

    // Get zone from URL
    const urlParams = new URLSearchParams(window.location.search);
    let zoneParam = urlParams.get('zone');
    
    if (zoneParam) {
        currentZone = decodeURIComponent(zoneParam);
        // Find the base zone key to get woredas
        let zoneKey = null;
        for (let key in woredasData) {
            if (zoneNames[key] && zoneNames[key].en === currentZone) {
                zoneKey = key;
                break;
            }
        }
        if (zoneKey && woredasData[zoneKey]) {
            zoneWoredas = woredasData[zoneKey][currentLang] || [];
        } else {
            zoneWoredas = [];
        }
    }

    document.getElementById('backBtn')?.addEventListener('click', () => window.location.href = 'zones.html');
    document.getElementById('backToZonesBtn')?.addEventListener('click', () => window.location.href = 'zones.html');

    const menuBtn = document.getElementById('menuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const closeMenu = document.getElementById('closeMenu');
    menuBtn?.addEventListener('click', () => mobileMenu.classList.add('open'));
    closeMenu?.addEventListener('click', () => mobileMenu.classList.remove('open'));

    document.querySelectorAll('.lang-btn, .menu-langs button').forEach(btn => {
        btn.addEventListener('click', () => {
            setLanguage(btn.getAttribute('data-lang'));
            mobileMenu.classList.remove('open');
        });
    });

    const savedLang = localStorage.getItem('preferredLang');
    setLanguage(savedLang && ['en','sid','amh'].includes(savedLang) ? savedLang : 'en');
</script>

</body>
</html>
